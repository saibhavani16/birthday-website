<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="birthday-title">Happy Birthday!</h1>
        <p id="birthday-message">Wishing you an amazing day filled with joy and laughter! 🎂</p>
        
        <div class="cake">
            <div class="candle">
                <div class="flame"></div>
            </div>
            <div class="cake-layer"></div>
        </div>
        
        <button class="celebrate-btn" onclick="celebrate()">🎊 Celebrate! 🎊</button>
        
        <div id="balloons"></div>
        <div id="confetti-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
